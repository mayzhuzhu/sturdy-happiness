文本格式化标签
主要用的格式（因为自带强调意义）<br>
<strong></strong>加粗俩标签中的字体
<em></em>倾斜
<ins></ins>下划线
<del></del>删除线
<hr>
以下为简写  <br>
<b></b>加粗
<i></i>倾斜
<u></u>下划线
<s></s>删除线
<hr><br><br><br><hr>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <strong>strong 加粗</strong> <br>
    <b>b 加粗</b>    <br>
    <em>em 倾斜</em> <br>
    <i>i 倾斜</i>    <br>
    <ins>ins 下划线</ins>    <br>
    <u>u 下划线</u>  <br>
    <del>del 删除线</del>    <br>
    <s>s 删除线</s>  <br>
</body>
</html>
